server.servlet.context-path=/music
server.port=19001
spring.application.name=jn_music
spring.main.allow-bean-definition-overriding=true
# 管理后台上传限制：音频文件可能明显超过 Spring Boot 默认 1MB，避免 multipart 在进入控制器前被 413 拦截。
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=220MB
# 管理后台相关初始化设置
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
# 数据源配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jiangnan?characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=jiangnan123
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool
